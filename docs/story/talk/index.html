<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lingo story - talk select</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="../list.js"></script>
  </head>
  <body data-list-target="talk">
    <main class="page app-shell">
      <section class="hero">
        <div class="eyebrow">STORY / TALK</div>
        <p class="lede">物語を選んでから、TALK 画面へ進みます。</p>
        <div class="story-picker-engine">
          <span>LLM</span>
          <button class="talk-engine-button active" type="button" data-talk-engine="auto">自動</button>
          <button class="talk-engine-button" type="button" data-talk-engine="ollama">Ollama</button>
          <button class="talk-engine-button" type="button" data-talk-engine="worker">Worker</button>
          <button class="talk-engine-button" type="button" data-talk-engine="builtin">Chrome 内蔵AI</button>
        </div>
        <div class="talk-ollama-config">
          <label for="talk-ollama-base-url">Ollama URL</label>
          <input id="talk-ollama-base-url" type="url" placeholder="http://localhost:11434" />
          <button id="talk-ollama-save" type="button" class="talk-engine-button">保存</button>
          <label for="talk-ollama-model">Ollama Model</label>
          <select id="talk-ollama-model">
            <option value="">読み込み中...</option>
          </select>
        </div>
      </section>

      <section class="home-feed">
        <div class="story-list" id="story-list-feed"></div>
      </section>
    </main>

    <nav class="mobile-nav" aria-label="app tabs">
      <a class="mobile-nav-item" href="../home/">HOME</a>
      <a class="mobile-nav-item active" href="./" aria-current="page">TALK</a>
      <a class="mobile-nav-item" href="../story/">STORY</a>
      <a class="mobile-nav-item" href="../mypage/">MY PAGE</a>
    </nav>
  </body>
</html>
