<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lingo story - talk</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="./main.js"></script>
  </head>
  <body class="talk-page">
    <main class="page app-shell">
      <section class="hero">
        <div class="talk-hero-row">
          <div class="eyebrow">STORY / TALK</div>
          <button class="button button-secondary talk-flow-toggle" id="talk-flow-btn" type="button">FLOW</button>
        </div>
      </section>

      <section class="talk-context panel">
        <div class="talk-context-head">
          <div>
            <p class="kicker">Current Story</p>
            <h2 id="talk-story-title">失われた街</h2>
          </div>
          <div class="talk-context-actions">
            <div class="talk-engine-switch" role="group" aria-label="LLM を切り替える">
              <span>LLM</span>
              <button class="talk-engine-button active" type="button" data-talk-engine="auto">自動</button>
              <button class="talk-engine-button" type="button" data-talk-engine="worker">Worker</button>
              <button class="talk-engine-button" type="button" data-talk-engine="builtin">Chrome 内蔵AI</button>
            </div>
            <span class="badge badge-secondary" id="talk-llm-status-badge">llm: idle</span>
            <a class="button button-secondary" href="./">選び直す</a>
          </div>
        </div>
        <p class="talk-context-description" id="talk-story-description"></p>
      </section>

      <section class="talk-shell panel">
        <div class="talk-log" id="talk-log" aria-live="polite"></div>
      </section>
    </main>

    <section class="talk-flow-layer" id="talk-flow-layer" aria-hidden="true">
      <div class="talk-flow-backdrop" data-flow-close></div>
      <section class="talk-flow-sheet panel" role="dialog" aria-modal="true" aria-labelledby="talk-flow-title">
        <div class="talk-flow-head">
          <div>
            <p class="kicker">FLOW</p>
            <h2 id="talk-flow-title">登場人物</h2>
          </div>
          <button class="button button-secondary talk-flow-close" id="talk-flow-close-btn" type="button">閉じる</button>
        </div>
        <p class="talk-flow-description" id="talk-flow-description"></p>
        <div class="talk-flow-grid" id="talk-flow-grid"></div>
      </section>
    </section>

    <div class="talk-dock">
      <div class="talk-composer">
        <label class="field talk-field" for="talk-input">
          <span>Talk</span>
          <textarea id="talk-input" rows="3" placeholder="会話・行動を入力"></textarea>
        </label>
        <button class="button button-primary" id="send-talk-btn" type="button">投稿</button>
      </div>

      <nav class="mobile-nav" aria-label="app tabs">
        <a class="mobile-nav-item" href="../home/">HOME</a>
        <a class="mobile-nav-item active" href="./" aria-current="page">TALK</a>
        <a class="mobile-nav-item" href="../story/">STORY</a>
        <a class="mobile-nav-item" href="../mypage/">MY PAGE</a>
      </nav>
    </div>
  </body>
</html>
