<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lingo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #132033;
        --muted: #5d6b82;
        --accent: #1f7aec;
        --accent-soft: rgba(31, 122, 236, 0.12);
        --border: rgba(19, 32, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #ffffff 0%, #f4f7fb 42%, #e8eef8 100%);
        color: var(--text);
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(19, 32, 51, 0.12);
        padding: 32px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3.8rem);
        line-height: 1.04;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 1rem;
      }

      .card {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
      }

      .label {
        margin: 0 0 8px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      code {
        display: block;
        padding: 14px 16px;
        border-radius: 14px;
        background: #0f172a;
        color: #e2e8f0;
        overflow-x: auto;
        font-size: 0.95rem;
      }

      .footer {
        margin-top: 22px;
        font-size: 0.92rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">GitHub Pages</span>
      <h1>lingo</h1>
      <p>
        Rust + WASM を使った多言語翻訳チャットアプリの公開ページです。
        まずは GitHub Pages の入口としてこのページを配置しています。
      </p>

      <section class="card" aria-label="project status">
        <p class="label">Status</p>
        <code>docs/index.html is ready for GitHub Pages publishing.</code>
      </section>

      <p class="footer">This page will be replaced as the app UI grows.</p>
    </main>
  </body>
</html>
